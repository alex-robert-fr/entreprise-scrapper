services:
  db:
    image: postgres:16-alpine
    container_name: scraper-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scraper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scraper}
      POSTGRES_DB: ${POSTGRES_DB:-scraper}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scraper} -d ${POSTGRES_DB:-scraper}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
